<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Godrej Properties — Pune | Hero Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10201A;
    --ink-soft:#182A21;
    --ink-line: rgba(244,239,228,0.14);
    --ivory:#F4EFE4;
    --ivory-dim: rgba(244,239,228,0.62);
    --brass:#B99A5B;
    --brass-light:#E3CD9C;
    --sage:#7E9C82;
    --radius: 4px;
    --ease: cubic-bezier(.22,.68,0,1);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    font-family:'Work Sans', sans-serif;
    color:var(--ivory);
  }

  .eyebrow-font{
    font-family:'IBM Plex Mono', monospace;
    text-transform:uppercase;
    letter-spacing:0.14em;
    font-weight:500;
  }

  /* ============ HERO ============ */
  .bannersection{
    position:relative;
    min-height:100vh;
    background:var(--ink);
    display:flex;
    align-items:center;
    overflow:hidden;
  }

  /* Carousel */
  .banner-carousel{ position:absolute; inset:0; z-index:0; }
  .banner-slide{
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    opacity:0;
    transition:opacity 1.1s var(--ease);
  }
  .banner-slide.active{ opacity:1; }

  .bannersection-overlay{
    position:absolute; inset:0; z-index:1;
    background:
      linear-gradient(90deg, rgba(16,32,26,0.6) 0%, rgba(16,32,26,0.38) 30%, rgba(16,32,26,0.14) 56%, rgba(16,32,26,0.04) 100%),
      linear-gradient(0deg, rgba(16,32,26,0.3) 0%, rgba(16,32,26,0) 24%);
  }

  /* thin brass frame — reinforces the "ledger / blueprint" feel */
  .hero-frame{
    position:absolute; inset:22px; z-index:2;
    border:1px solid rgba(185,154,91,0.28);
    pointer-events:none;
  }
  .hero-frame::before, .hero-frame::after{
    content:'';
    position:absolute; width:22px; height:22px;
    border:1px solid var(--brass);
  }
  .hero-frame::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .hero-frame::after{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .banner-carousel-dots{
    position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
    z-index:5; display:flex; gap:10px; align-items:center;
  }
  .carousel-dot{
    width:7px; height:7px; border-radius:50%;
    background:transparent; border:1px solid rgba(244,239,228,0.5);
    cursor:pointer; padding:0; transition:all .35s var(--ease);
  }
  .carousel-dot.active{ background:var(--brass); border-color:var(--brass); width:22px; border-radius:4px; }

  .hero-grid{
    position:relative; z-index:3;
    max-width:1320px; width:100%; margin:0 auto;
    padding:7rem 3rem 4rem;
    display:grid;
    grid-template-columns:1.15fr 0.78fr;
    gap:5rem;
    align-items:center;
  }

  /* -------- Left content -------- */
  .hero-content{ position:relative; }

  .hero-tag{
    display:inline-flex; align-items:center; gap:10px;
    color:var(--brass-light);
    font-size:0.72rem;
    padding-bottom:14px;
    margin-bottom:22px;
    border-bottom:1px solid var(--ink-line);
  }
  .hero-tag .dot{ width:5px; height:5px; border-radius:50%; background:var(--sage); box-shadow:0 0 0 3px rgba(126,156,130,0.25); }

  .hero-title{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(2.6rem, 4.2vw, 4rem);
    line-height:1.05;
    letter-spacing:-0.01em;
    color:var(--ivory);
    margin:0 0 2.2rem;
    max-width:11ch;
    text-shadow:0 2px 24px rgba(0,0,0,0.45);
  }
  .hero-title em{
    font-style:italic;
    font-weight:500;
    color:var(--brass-light);
  }

  .hero-desc{
    font-size:1.05rem;
    line-height:1.65;
    color:var(--ivory-dim);
    max-width:480px;
    margin-bottom:2.4rem;
    font-weight:400;
  }

  .hero-highlights{
    display:flex; flex-wrap:wrap;
    margin-bottom:2.6rem;
  }
  .highlight-item{
    display:flex; align-items:center; gap:9px;
    font-size:0.85rem;
    color:var(--ivory);
    padding:0 1.4rem;
    border-right:1px solid var(--ink-line);
    text-shadow:0 1px 12px rgba(0,0,0,0.4);
  }
  .highlight-item:first-child{ padding-left:0; }
  .highlight-item:last-child{ border-right:none; }
  .highlight-item svg{ width:15px; height:15px; color:var(--sage); flex-shrink:0; }

  .btn-gold{
    display:inline-flex; align-items:center; gap:10px;
    background:transparent;
    color:var(--brass-light);
    border:1px solid var(--brass);
    padding:15px 30px;
    font-family:'Work Sans', sans-serif;
    font-size:0.9rem;
    font-weight:600;
    letter-spacing:0.02em;
    border-radius:2px;
    cursor:pointer;
    transition:all .35s var(--ease);
  }
  .btn-gold:hover{
    background:var(--brass);
    color:var(--ink);
    box-shadow:0 10px 30px -8px rgba(185,154,91,0.55);
  }
  .btn-gold svg{ width:16px; height:16px; }

  /* signature element: architectural line-plan sketch, draws itself in */
  .blueprint-sketch{
    position:absolute;
    right:-40px; top:50%; transform:translateY(-50%);
    width:230px; height:230px;
    opacity:0.9;
    pointer-events:none;
    display:none;
  }
  .blueprint-sketch path{
    fill:none;
    stroke:var(--brass);
    stroke-width:1;
    stroke-dasharray:900;
    stroke-dashoffset:900;
    animation:draw 2.6s var(--ease) 0.4s forwards;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  /* -------- Right form card -------- */
  .hero-form-wrapper{ position:relative; }

  .hero-form-card{
    background:var(--ink-soft);
    border:1px solid var(--ink-line);
    border-top:2px solid var(--brass);
    padding:2.4rem 2.2rem 2.2rem;
    position:relative;
  }

  .form-header{ margin-bottom:1.8rem; }
  .form-eyebrow{
    color:var(--sage);
    font-size:0.68rem;
    margin-bottom:10px;
    display:block;
  }
  .form-title{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:1.5rem;
    color:var(--ivory);
    margin:0 0 6px;
  }
  .form-subtitle{
    font-size:0.85rem;
    color:var(--ivory-dim);
    margin:0;
    line-height:1.5;
  }

  .form-inputContainer{ margin-bottom:1.15rem; }
  .form-inputContainer label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--ivory-dim);
    margin-bottom:8px;
  }

  .form-input{
    width:100%;
    padding:11px 2px;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--ink-line);
    color:var(--ivory);
    font-family:'Work Sans', sans-serif;
    font-size:0.95rem;
    outline:none;
    transition:border-color .3s var(--ease);
  }
  .form-input::placeholder{ color:rgba(244,239,228,0.32); }
  .form-input:focus{ border-color:var(--brass); }

  .hero-form-card select.form-input{ color:var(--ivory); cursor:pointer; }
  .hero-form-card select.form-input option{ background:var(--ink-soft); color:var(--ivory); }

  .row-split{ display:grid; grid-template-columns:88px 1fr; gap:14px; }

  .consent-row{
    display:flex; gap:10px; align-items:flex-start;
    margin-bottom:1.5rem;
    padding-top:0.4rem;
  }
  .consent-row input{ margin-top:3px; accent-color:var(--brass); }
  .form-checkboxlabel{
    color:var(--ivory-dim);
    font-size:0.72rem;
    line-height:1.5;
    cursor:pointer;
  }
  .form-checkboxlabel a{ color:var(--brass-light); text-decoration:underline; }

  .form-SubmitBtn{
    width:100%;
    padding:15px;
    background:var(--brass);
    color:var(--ink);
    border:none;
    border-radius:2px;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:0.92rem;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:all .3s var(--ease);
  }
  .form-SubmitBtn:hover{ background:var(--brass-light); box-shadow:0 12px 28px -10px rgba(185,154,91,0.6); }

  .form-trust{
    margin-top:1.1rem;
    text-align:center;
    font-size:0.68rem;
    color:rgba(244,239,228,0.4);
    letter-spacing:0.04em;
  }

  @media (min-width:1024px){ .blueprint-sketch{ display:block; } }

  /* ============ MOBILE ============ */
  @media (max-width:768px){
    .bannersection{ min-height:auto; display:block; }
    .banner-carousel{ position:relative; height:46vh; min-height:340px; }
    .hero-frame{ inset:12px; }
    .bannersection-overlay{
      background:linear-gradient(180deg, rgba(16,32,26,0.25) 0%, rgba(16,32,26,0.95) 82%, var(--ink) 100%);
    }
    .hero-grid{
      grid-template-columns:1fr;
      padding:0 1.4rem 2.4rem;
      margin-top:-90px;
      gap:2.2rem;
    }
    .hero-tag{ font-size:0.66rem; }
    .hero-title{ font-size:2rem; max-width:none; }
    .hero-desc{ font-size:0.95rem; max-width:none; }
    .hero-highlights{ gap:0; }
    .highlight-item{ font-size:0.78rem; padding:0 1rem; }
    .btn-gold{ width:100%; justify-content:center; }
    .hero-form-card{ padding:1.9rem 1.4rem; }
  }
</style>
</head>
<body>

<section class="bannersection">
  <div class="banner-carousel" id="bannerCarousel" aria-label="Banner image carousel">
    <div class="banner-slide active" style="background-image:url('assests/images/banner/banner.webp');"></div>
    <div class="banner-slide" style="background-image:url('assests/images/banner/card-lg-1.webp');"></div>
    <div class="banner-slide" style="background-image:url('assests/images/banner/card-lg-2.webp');"></div>
    <div class="banner-slide" style="background-image:url('assests/images/banner/card-lg-3.webp');"></div>
  </div>

  <div class="bannersection-overlay"></div>
  <div class="hero-frame"></div>

  <div class="banner-carousel-dots" id="bannerDots" aria-label="Carousel navigation">
    <button class="carousel-dot active" data-index="0" aria-label="Slide 1"></button>
    <button class="carousel-dot" data-index="1" aria-label="Slide 2"></button>
    <button class="carousel-dot" data-index="2" aria-label="Slide 3"></button>
    <button class="carousel-dot" data-index="3" aria-label="Slide 4"></button>
  </div>

  <div class="hero-grid">
    <!-- Left -->
    <div class="hero-content">
      <div class="hero-tag eyebrow-font"><span class="dot"></span>Godrej Properties — Pune</div>

      <h1 class="hero-title">Homes built for <em>how you actually live</em></h1>

      <div class="hero-highlights">
        <div class="highlight-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
          RERA Certified
        </div>
        <div class="highlight-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
          Zero Brokerage
        </div>
        <div class="highlight-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
          50+ Facilities
        </div>
      </div>

      <button class="btn-gold popup-trigger" data-subheading="Download Brochure">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Download Brochure
      </button>

      <svg class="blueprint-sketch" viewBox="0 0 200 200" aria-hidden="true">
        <path d="M20 180 L20 40 L100 10 L180 40 L180 180 Z"></path>
        <path d="M20 90 L180 90"></path>
        <path d="M70 90 L70 180"></path>
        <path d="M130 90 L130 180"></path>
        <path d="M40 130 L58 130 L58 160 L40 160 Z"></path>
        <path d="M90 130 L110 130 L110 160 L90 160 Z"></path>
        <path d="M142 130 L160 130 L160 160 L142 160 Z"></path>
      </svg>
    </div>

    <!-- Right form -->
    <div class="hero-form-wrapper">
      <div class="hero-form-card" id="stickyForm">
        <div class="form-header">
          <span class="form-eyebrow eyebrow-font">Private Enquiry</span>
          <h2 class="form-title">Get today's pricing</h2>
          <p class="form-subtitle">Share your details — a property advisor will call within the hour.</p>
        </div>
        <form id="ModalFormSlug1" data-tracking-id="form_2">
          <div class="form-inputContainer">
            <label for="f-name">Full name</label>
            <input id="f-name" type="text" class="form-input form-name" placeholder="Enter your name" aria-label="Enter Your Name" required />
          </div>

          <div class="form-inputContainer row-split">
            <div>
              <label for="f-code">Code</label>
              <select id="f-code" class="form-input form-country" aria-label="Select Country Code" required>
                <option value="+91" selected>+91</option>
                <option value="+1">+1</option>
                <option value="+44">+44</option>
                <option value="+971">+971</option>
              </select>
            </div>
            <div>
              <label for="f-number">Mobile number</label>
              <input id="f-number" type="text" class="form-input form-number" placeholder="98765 43210" aria-label="Enter Mobile Number" required />
            </div>
          </div>

          <div class="form-inputContainer">
            <label for="f-project">Project</label>
            <select id="f-project" class="form-input form-project" aria-label="Select Project" required>
              <option value="6056" disabled selected>Select a project</option>
              <option value="5780">Godrej Elaris</option>
              <option value="6023">Godrej Kharadi</option>
              <option value="6052">The Aqua Retreat</option>
            </select>
          </div>

          <div class="consent-row">
            <input type="checkbox" id="form-checkbox" checked required />
            <label for="form-checkbox" class="form-checkboxlabel">I consent to receive updates in accordance with the <a href="https://www.homesfy.co.in/privacy.html" target="_blank" rel="noopener">privacy policy</a></label>
          </div>

          <div class="form-inputContainer" style="margin-bottom:0;">
            <button type="submit" class="form-SubmitBtn">Get Offer Details</button>
          </div>
        </form>
        <p class="form-trust">No spam. No brokerage. Ever.</p>
      </div>
    </div>
  </div>
</section>

<script>
  (function(){
    const slides = document.querySelectorAll('.banner-slide');
    const dots = document.querySelectorAll('.carousel-dot');
    let current = 0;
    function show(i){
      slides.forEach(s=>s.classList.remove('active'));
      dots.forEach(d=>d.classList.remove('active'));
      slides[i].classList.add('active');
      dots[i].classList.add('active');
      current = i;
    }
    dots.forEach(dot=>{
      dot.addEventListener('click', ()=> show(parseInt(dot.dataset.index)));
    });
    setInterval(()=>{ show((current+1) % slides.length); }, 5000);
  })();
</script>

</body>
</html>
